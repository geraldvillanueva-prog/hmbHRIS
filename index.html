<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMB HRIS – Login</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--navy:#0a1628;
--blue:#1565c0;
--accent:#00b4d8;
--bg:#f0f4f8;
--border:#dce3ec;
--text:#1a2332;
--muted:#6b7c93;
--green:#2e7d32;
--red:#c62828
}

/* ===== VIDEO BACKGROUND ===== */
.bg-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  pointer-events:none;
}

/* overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
 /* background:linear-gradient(
    rgba(183, 189, 198, 0.65),
    rgba(111, 118, 129, 0.75)
  );*/
  z-index:-1;
}

body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1rem
}

/* make sure content is above */
.login-wrap{
  width:100%;
  max-width:420px;
  position:relative;
  z-index:10;
}

.login-logo{text-align:center;margin-bottom:2rem}
.logo-box{width:64px;height:64px;background:var(--navy);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px}
.logo-text{font-size:22px;font-weight:700;color:#fff;letter-spacing:1px}
.brand-name{font-size:24px;font-weight:700;color:var(--navy)}
.brand-sub{font-size:12px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;margin-top:2px}

.card{
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(6px);
  border:1px solid var(--border);
  border-radius:12px;
  padding:2rem;
  box-shadow:0 4px 24px rgba(10,22,40,0.2)
}

.card-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:1.5rem}

.f{margin-bottom:1rem}
.f label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}

input{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:6px;
  font-size:14px;
  font-family:'IBM Plex Sans',sans-serif;
  color:var(--text);
  transition:border .15s
}

input:focus{
  outline:none;
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(21,101,192,.1)
}

.btn{
  width:100%;
  padding:11px;
  background:var(--blue);
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:14px;
  font-weight:700;
  font-family:'IBM Plex Sans',sans-serif;
  cursor:pointer;
  transition:background .15s;
  margin-top:.5rem
}

.btn:hover{background:#0d47a1}

.err{
  background:#ffebee;
  color:var(--red);
  border:1px solid #ef9a9a;
  border-radius:6px;
  padding:10px 14px;
  font-size:13px;
  margin-bottom:1rem;
  display:none
}

.role-tabs{display:flex;gap:8px;margin-bottom:1.5rem}

.rtab{
  flex:1;
  padding:9px;
  border:2px solid var(--border);
  border-radius:8px;
  text-align:center;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
  color:var(--muted);
  transition:all .15s;
  background:#fff
}

.rtab.on{
  border-color:var(--blue);
  color:var(--blue);
  background:#e3f2fd
}

.rtab-icon{font-size:20px;display:block;margin-bottom:2px}
</style>
</head>

<body>

<!-- 🎥 VIDEO BACKGROUND -->
<video autoplay muted loop playsinline class="bg-video">
  <source src="Pulag.mp4" type="video/mp4">
</video>

<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-box"><span class="logo-text">HMB</span></div>
    <div class="brand-name">HMB Management</div>
    <div class="brand-sub">HRIS Platform</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your account</div>

    <div class="role-tabs">
      <div class="rtab on" id="tab-admin" onclick="setRole('admin')"><span class="rtab-icon">🏢</span>HR Admin</div>
      <div class="rtab" id="tab-supervisor" onclick="setRole('supervisor')"><span class="rtab-icon">👔</span>Supervisor</div>
      <div class="rtab" id="tab-employee" onclick="setRole('employee')"><span class="rtab-icon">👤</span>Employee</div>
    </div>

    <div class="err" id="err-msg"></div>

    <div class="f">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <div class="f">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn" onclick="doLogin()" id="login-btn">Sign In</button>
  </div>
</div>

<script>
var role = 'admin';
function setRole(r) {
  role = r;
  document.getElementById('tab-admin').classList.toggle('on', r === 'admin');
  document.getElementById('tab-supervisor').classList.toggle('on', r === 'supervisor');
  document.getElementById('tab-employee').classList.toggle('on', r === 'employee');
}

async function doLogin() {
  var u = document.getElementById('username').value.trim();
  var p = document.getElementById('password').value;
  var err = document.getElementById('err-msg');
  var btn = document.getElementById('login-btn');

  if (!u || !p) { showErr('Please enter username and password.'); return; }

  btn.textContent = 'Signing in…';
  btn.disabled = true;

  try {
    var res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: u, password: p })
    });

    var data = await res.json();

    if (data.success) {
      if (data.role === 'admin') window.location.href = '/admin.html';
      else if (data.role === 'supervisor') window.location.href = '/supervisor.html';
      else window.location.href = '/employee.html';
    } else {
      showErr(data.error || 'Invalid credentials.');
      btn.textContent = 'Sign In'; btn.disabled = false;
    }

  } catch(e) {
    showErr('Connection error. Please try again.');
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
}

function showErr(msg) {
  var el = document.getElementById('err-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

// session check
fetch('/api/me')
.then(r => r.json())
.then(u => {
  if (u && u.role) {
    if (u.role === 'admin') window.location.href = '/admin.html';
    else if (u.role === 'supervisor') window.location.href = '/supervisor.html';
    else window.location.href = '/employee.html';
  }
})
.catch(()=>{});
</script>

</body>
</html>
